name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # Panorama faces + default favicon are gitignored (fetched from Mojang's
      # CDN, never committed), so the runner has none. Download them before the
      # build copies public/ into dist/. Uses assets:refresh (not :ensure) so a
      # CDN failure fails the deploy loudly instead of shipping a broken site.
      - name: Fetch Mojang assets (panorama faces + default favicon)
        run: npm run assets:refresh
      - name: Build
        run: npm run build
        # Serve from /<repo>/ on project Pages sites; derived automatically.
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
