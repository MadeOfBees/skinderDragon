name: Refresh panorama

# Keeps the title-screen panorama in sync with the latest Minecraft snapshot.
# Runs weekly (and on demand); if the extracted faces differ from what's
# committed, it opens a PR rather than pushing to the default branch.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Refresh panorama from latest snapshot
        run: npm run panorama:refresh

      - name: Open a PR if the panorama changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain src/assets/panorama)" ]; then
            echo "Panorama already up to date — nothing to do."
            exit 0
          fi

          BRANCH="chore/panorama-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/assets/panorama
          git commit -m "chore: refresh title panorama from latest snapshot"
          git push --force origin "$BRANCH"

          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "PR already open for $BRANCH."
          else
            gh pr create \
              --title "chore: refresh title panorama" \
              --body "Automated panorama refresh from the latest Minecraft snapshot. Review the updated cube faces in \`src/assets/panorama/\` before merging." \
              --head "$BRANCH" \
              --base "${{ github.event.repository.default_branch }}"
          fi
